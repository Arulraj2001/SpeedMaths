<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Mode - SpeedMaths</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --background: #09090b;
      --foreground: #fafafa;
      --primary: #6366f1;
      --card: #18181b;
      --border: #27272a;
      --muted: #a1a1aa;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
    }
    .card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      font-weight: 800;
      letter-spacing: -0.025em;
    }
    p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .offline-links {
      margin-top: 30px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      text-align: left;
    }
    .offline-links-title {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .links-grid {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 10px;
    }
    .links-grid a {
      color: var(--primary);
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
    }
    .links-grid a:hover {
      text-decoration: underline;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>No Connection Found</h1>
    <p>You are currently offline. However, SpeedMaths stores your times tables and core practice modules locally so you can continue training!</p>
    <a href="/practice" class="btn">Open Practice Engine</a>
    
    <div class="offline-links">
      <div class="offline-links-title">Offline Saved Guides</div>
      <div class="links-grid">
        <a href="/learn/tables">Times Tables</a>
        <a href="/learn/squares">Squares (1-100)</a>
        <a href="/learn/cubes">Cubes (1-50)</a>
        <a href="/learn/powers">Powers Chart</a>
      </div>
    </div>
  </div>
</body>
</html>
